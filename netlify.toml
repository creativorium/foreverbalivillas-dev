[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "ADMIN_USERNAME,MAILCHIMP_SERVER_PREFIX,NEXT_PUBLIC_SITE_URL,CUSTOM_STORAGE_URL"

[functions]
  node_bundler = "nft"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Block common WordPress / exploit-scanner probe paths at the CDN edge,
# so they return a static 404 without invoking a serverless function.
[[redirects]]
  from = "/wp-admin/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/wp-includes/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/wp-content/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/wp-json/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/wp-login.php"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/xmlrpc.php"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.php"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.env"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.git/*"
  to = "/404.html"
  status = 404
  force = true
